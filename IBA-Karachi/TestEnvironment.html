<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OpenPrep.pk — Free Test Prep for Pakistani Students</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <!-- Your stylesheet -->
  <link rel="stylesheet" href="../openprep.css"/>
</head>
<body>
   <!-- ─── FLASHCARD DEMO ────────────────────────────── -->
  <section class="demo-section">
    <div class="demo-inner">
      <div class="demo-label">Test environment — live preview</div>
      <h2 class="demo-title">One question. Full focus.</h2>

      <div class="flashcard-shell">
        <div class="flashcard-wrap" id="fcWrap">

          <!-- Front face (question) -->
          <div class="card-face card-front">
            <div>
              <div class="card-q-label">
                Question <span id="qNum">1</span> of <span id="qTotal">5</span>
              </div>
              <div class="card-question" id="qText">Loading question…</div>
            </div>
            <div class="card-bottom">
              <span class="card-subject" id="qSubject"></span>
              <span class="flip-hint" onclick="flipCard()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M4 12v-1a8 8 0 0 1 8-8 8 8 0 0 1 5.657 2.343M20 12v1a8 8 0 0 1-8 8 8 8 0 0 1-5.657-2.343"/>
                  <polyline points="20 5 20 12 13 12"/>
                  <polyline points="4 19 4 12 11 12"/>
                </svg>
                Reveal answer
              </span>
            </div>
          </div>

          <!-- Back face (answer) -->
          <div class="card-face card-back">
            <div>
              <div class="card-q-label">Answer</div>
              <div class="card-answer" id="aText"></div>
            </div>
            <div class="card-bottom">
              <span class="card-subject" id="aSubject"></span>
              <span class="flip-hint" onclick="flipCard()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M4 12v-1a8 8 0 0 1 8-8 8 8 0 0 1 5.657 2.343M20 12v1a8 8 0 0 1-8 8 8 8 0 0 1-5.657-2.343"/>
                  <polyline points="20 5 20 12 13 12"/>
                  <polyline points="4 19 4 12 11 12"/>
                </svg>
                Back to question
              </span>
            </div>
          </div>

        </div>
      </div>

      <!-- Controls -->
      <div class="fc-controls">
        <button class="fc-btn" id="prevBtn" onclick="prevCard()" disabled>← Prev</button>
        <span class="fc-count" id="fcCount">1 / 5</span>
        <div class="fc-progress">
          <div class="fc-progress-fill" id="fcBar" style="width:20%"></div>
        </div>
        <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next →</button>
      </div>

    </div>
  </section>


</body>
